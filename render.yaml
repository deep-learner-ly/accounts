services:
  - type: web
    name: bookkeeping-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: bookkeeping-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: bookkeeping-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: bookkeeping-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: PORT
        value: 8080

  - type: psql
    name: bookkeeping-db
    env: docker
    plan: free
    databaseName: bookkeeping
    user: bookkeeping_user

  - type: web
    name: bookkeeping-frontend
    env: static
    buildCommand: ""
    staticPublishPath: ui-prototype
    pullRequestPreviewsEnabled: false
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: bookkeeping-backend
          property: host