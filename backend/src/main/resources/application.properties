spring.application.name=bookkeeping

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/bookkeeping;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.url=jdbc:h2:mem:bookkeeping;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# Initialize Schema
spring.sql.init.mode=always

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Logging
logging.level.com.example.bookkeeping=DEBUG
logging.level.org.springframework.web=INFO
