spring.application.name=bookkeeping

# Database Configuration
# Default to H2 if no profile active
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/bookkeeping;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# H2 Console (only enabled locally)
spring.h2.console.enabled=true

# Initialize Schema
spring.sql.init.mode=always

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Logging
logging.level.com.example.bookkeeping=DEBUG
logging.level.org.springframework.web=INFO
